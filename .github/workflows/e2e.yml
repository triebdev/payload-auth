# Pattern aligned with payload-plugin-backup-mongodb: Mongo service, Next production
# build, then Playwright against `next start` (no dev watcher in CI).
#
# The job runs inside the official Playwright container image, which ships the
# browsers and their OS dependencies preinstalled. This avoids
# `playwright install --with-deps` shelling out to apt on the runner, which has
# been hanging for tens of minutes. Keep the image tag in sync with the
# @playwright/test version in package.json.

name: E2E (Playwright)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    services:
      mongo:
        image: mongo:7
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: "true"
      NODE_ENV: test
      NEXT_TELEMETRY_DISABLED: "1"
      PAYLOAD_CONFIG_PATH: ./dev/payload.config.ts
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SERVER_URL: http://127.0.0.1:3000
      # Inside a container job, the service is reached by its name, not localhost.
      DATABASE_URL: mongodb://mongo:27017/payload-auth-e2e
      MONGODB_URI: mongodb://mongo:27017/payload-auth-e2e
      PAYLOAD_SECRET: e2e-payload-secret-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies (no install scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Rebuild approved native deps
        run: pnpm rebuild

      - name: Install Playwright browser (already in image; no apt)
        timeout-minutes: 5
        run: pnpm exec playwright install chromium

      - name: Cache Next.js build (dev app)
        uses: actions/cache@v5
        with:
          path: dev/.next/cache
          key: ${{ runner.os }}-next-dev-${{ hashFiles('pnpm-lock.yaml', 'dev/next.config.mjs', 'dev/app/**', 'dev/payload.config.ts', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-next-dev-

      - name: Build plugin (dist)
        run: pnpm run build

      - name: Build dev Next app
        run: pnpm run build:dev

      - name: Run Playwright E2E
        run: pnpm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
